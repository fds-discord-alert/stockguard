# kube-prometheus-stack values for EKS
# Keep this minimal and stable for GitOps.

grafana:
  enabled: true
  service:
    type: ClusterIP
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: false

# EKS control plane components are managed by AWS and not directly scrapeable.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
